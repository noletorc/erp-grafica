
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Comunicação Visual</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
<h2>🖨 ERP Gráfica</h2>

<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('kanban')">Produção</a>
<a onclick="showPage('orcamento')">Orçamentos</a>

</div>

<div class="main">

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Pedidos</h3>
<span id="totalPedidos">0</span>
</div>

<div class="card">
<h3>Total a Receber</h3>
<span id="totalReceber">R$ 0</span>
</div>

<div class="card">
<h3>Recebido</h3>
<span id="totalRecebido">R$ 0</span>
</div>

</div>

<canvas id="graficoFinanceiro"></canvas>

</div>


<div id="kanban" class="page" style="display:none">

<h1>Produção</h1>

<div class="kanban">

<div class="column"><h3>ORÇAMENTO</h3><div id="orcamento"></div></div>
<div class="column"><h3>ARTE</h3><div id="arte"></div></div>
<div class="column"><h3>PRODUÇÃO</h3><div id="producao"></div></div>
<div class="column"><h3>ACABAMENTO</h3><div id="acabamento"></div></div>
<div class="column"><h3>CONCLUINDO</h3><div id="concluindo"></div></div>
<div class="column"><h3>PAGO</h3><div id="pago"></div></div>

</div>

</div>


<div id="orcamento" class="page" style="display:none">

<h1>Novo Orçamento</h1>

<input id="cliente" placeholder="Cliente"><br>
<input id="whatsapp" placeholder="WhatsApp"><br>

<label>Largura</label>
<input id="largura"><br>

<label>Altura</label>
<input id="altura"><br>

<label>Preço m²</label>
<input id="preco"><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<button onclick="criarPedido()">Criar Pedido</button>

</div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
