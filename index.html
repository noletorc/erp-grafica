<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Gráfica</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="sidebar">
<h2>ERP GRÁFICA</h2>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('novo')">Novo Pedido</a>
<a onclick="showPage('kanban')">Produção</a>
<a onclick="showPage('financeiro')">Financeiro</a>
</div>

<div class="main">

<div id="dashboard" class="page">
<h1>Dashboard</h1>
<div class="cards">
<div class="card"><h3>Pedidos</h3><span id="totalPedidos">0</span></div>
<div class="card"><h3>A Receber</h3><span id="totalReceber">R$0</span></div>
<div class="card"><h3>Recebido</h3><span id="totalRecebido">R$0</span></div>
</div>
</div>

<div id="novo" class="page" style="display:none">
<h1>Novo Pedido</h1>
<input id="cliente" placeholder="Cliente">
<input id="servico" placeholder="Serviço">
<label>Largura</label>
<input id="largura">
<label>Altura</label>
<input id="altura">
<label>Preço m²</label>
<input id="preco">
<button onclick="calcular()">Calcular</button>
<p id="valor"></p>
<button onclick="criarPedido()">Salvar Pedido</button>
</div>

<div id="kanban" class="page" style="display:none">
<h1>Produção</h1>
<div class="kanban">
<div class="column"><h3>ORÇAMENTO</h3><div id="col-orcamento"></div></div>
<div class="column"><h3>ARTE</h3><div id="col-arte"></div></div>
<div class="column"><h3>PRODUÇÃO</h3><div id="col-producao"></div></div>
<div class="column"><h3>ACABAMENTO</h3><div id="col-acabamento"></div></div>
<div class="column"><h3>ENTREGA</h3><div id="col-entrega"></div></div>
<div class="column"><h3>PAGO</h3><div id="col-pago"></div></div>
</div>
</div>

<div id="financeiro" class="page" style="display:none">
<h1>Financeiro</h1>
<p>Total a receber: <b id="finReceber">R$0</b></p>
<p>Total recebido: <b id="finRecebido">R$0</b></p>
</div>

</div>

<script src="./js/app.js"></script>
</body>
</html>
