
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Gráfica Rogerio Noleto</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="topo">
<img src="assets/logo.png" class="logo">
<div>
<h1>ERP - Gráfica Rápida e Troféus</h1>
<p>Rogerio Noleto</p>
</div>
</header>

<section class="novo">
<h2>Novo Pedido</h2>

<input id="cliente" placeholder="Nome do cliente">
<input id="whatsapp" placeholder="WhatsApp">
<input id="servico" placeholder="Serviço">
<input id="valor" placeholder="Valor">
<input id="prazo" type="date">

<label>Pago?</label>
<select id="pago">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<button onclick="criarPedido()">Criar Pedido</button>
</section>

<h2>Kanban Produção</h2>

<div class="kanban">
<div class="col" id="ORCAMENTO"><h3>ORÇAMENTO</h3></div>
<div class="col" id="ARTE"><h3>ARTE E CRIAÇÃO</h3></div>
<div class="col" id="PRODUCAO"><h3>PRODUÇÃO</h3></div>
<div class="col" id="ACABAMENTO"><h3>ACABAMENTO</h3></div>
<div class="col" id="CONCLUINDO"><h3>CONCLUINDO</h3></div>
<div class="col" id="PAGO"><h3>PAGO</h3></div>
</div>

<h2>Produção</h2>
<canvas id="graficoProducao"></canvas>

<h2>Financeiro</h2>
<canvas id="graficoFinanceiro"></canvas>

<script src="script.js"></script>
</body>
</html>
