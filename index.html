</div>

<div class="card">

<script>

new Chart(ctx,{
type:'bar',
data:{
labels:['Jan','Fev','Mar','Abr','Mai'],
datasets:[{
label:'Faturamento',
data:[5000,8000,6500,9000,12500]
}]
}
